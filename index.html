// ─── GOOGLE SHEETS SYNC ───────────────────────────────────────────────────────
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzfxL3vmXBZl8L5mZIeIRYRsb9TlM49n0OsQsd4LAdSeP4Sa7up9thAWVlsIHcwb1ko/exec';
const SYNC_ENABLED = true;

async function syncToSheets(sessionId, exerciseId, data) {
    if (!SYNC_ENABLED || !navigator.onLine) {
        console.log('Sync skipped: offline or disabled');
        return;
    }
    
    const week = sessionId.match(/w(\d+)/)[1];
    const sessionType = sessionId.match(/s([ABC])/)[1];
    
    try {
        const response = await fetch(SHEETS_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                timestamp: new Date().toISOString(),
                week: `S${week}`,
                session: `Séance ${sessionType}`,
                exercise: EXERCISES[exerciseId]?.name || exerciseId,
                weight: data.weight,
                reps: data.reps,
                sets: data.sets,
                feeling: data.feeling,
                notes: ''
            })
        });
        console.log('✓ Synced to Google Sheets:', exerciseId);
    } catch (err) {
        console.error('✗ Sheets sync failed:', err);
    }
}

async function syncCardioToSheets(sessionId, cardioData) {
    if (!SYNC_ENABLED || !navigator.onLine) return;
    
    const week = sessionId.match(/w(\d+)/)[1];
    const sessionType = sessionId.match(/s([ABC])/)[1];
    
    try {
        await fetch(SHEETS_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                timestamp: new Date().toISOString(),
                week: `S${week}`,
                session: `Séance ${sessionType} (Cardio)`,
                exercise: 'Cardio',
                weight: '',
                reps: '',
                sets: '',
                feeling: '',
                notes: `${cardioData.duration}min • Niv.${cardioData.level} • ${cardioData.kcal}kcal • ${cardioData.distance}km`
            })
        });
        console.log('✓ Synced cardio to Google Sheets');
    } catch (err) {
        console.error('✗ Cardio sync failed:', err);
    }
}

let currentWeek = 5;
let showArchive = false;
let currentExercise = null;
let selectedFeeling = null;
let timerInterval = null;
let timerSeconds = 0;
let expandedSessions = {};

document.addEventListener('DOMContentLoaded', () => {
    initHistory();
    
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('✓ Service Worker registered'))
            .catch(err => console.log('✗ SW registration failed:', err));
    }
    
    // PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('💪 App can be installed on home screen!');
    });
    
    // Auto-expand sessions not yet done
    const tracking = getTracking();
    ['w1sA','w1sB','w1sC','w2sA','w2sB','w2sC','w3sA','w3sB','w3sC'].forEach(id => {
        expandedSessions[id] = !(tracking[id]?.completed);
    });
    render();
    document.querySelectorAll('.week-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const weekValue = btn.dataset.week;
            if (weekValue === 'archive') {
                showArchive = true;
            } else {
                showArchive = false;
                currentWeek = parseInt(weekValue);
            }
            render();
        });
    });
});

function getTracking() { return JSON.parse(localStorage.getItem('workoutTracking') || '{}'); }
function saveTracking(data) { localStorage.setItem('workoutTracking', JSON.stringify(data)); }

function updateArchiveStats() {
    const tracking = getTracking();
    const archiveIds = ['w1sA','w1sB','w1sC','w2sA','w2sB','w2sC','w3sA','w3sB','w3sC','w4sA','w4sB','w4sC'];
    const completedArchive = archiveIds.filter(id => tracking[id]?.completed).length;
    document.getElementById('statSessions').textContent = `${completedArchive}/12`;
    document.getElementById('statExos').textContent = '—';
    const allIds = ['w1sA','w1sB','w1sC','w2sA','w2sB','w2sC','w3sA','w3sB','w3sC','w4sA','w4sB','w4sC','w5sA','w5sB','w5sC','w6sA','w6sB','w6sC','w7sA','w7sB','w7sC'];
    const streak = allIds.filter(id => tracking[id]?.completed).length;
    document.getElementById('statStreak').textContent = streak;
}

function toggleExpand(id) {
    expandedSessions[id] = !expandedSessions[id];
    render();
}

function mediaHtml(exerciseId) {
    const m = MEDIA[exerciseId];
    if (!m) return `<div class="media-placeholder"><div class="ph-icon">🏋️</div><p>Pas de visuel disponible</p></div>`;
    const badge = m.type === 'gif' ? 'GIF animé' : 'Image';
    return `
    <div class="media-container">
        <img id="media_${exerciseId}" src="${m.gif}" alt="${exerciseId}"
            onerror="handleMediaError('${exerciseId}')">
        <span class="media-badge" id="mediabadge_${exerciseId}">${badge}</span>
    </div>`;
}

function handleMediaError(id) {
    const m = MEDIA[id];
    const img = document.getElementById('media_'+id);
    const badge = document.getElementById('mediabadge_'+id);
    if (!img) return;
    if (img.src !== m.img) {
        img.src = m.img;
        if (badge) badge.textContent = 'Image';
    } else {
        img.parentElement.style.display = 'none';
    }
}

function render() {
    const container = document.getElementById('mainContainer');
    container.innerHTML = '';
    const tracking = getTracking();
    
    // Mode Archive : affiche S1-S4
    if (showArchive) {
        container.innerHTML = '<div style="padding: 20px; text-align: center; color: #888; margin-bottom: 20px; font-size: 18px; font-weight: 600;">📁 Archives — Semaines 1 à 4</div>';
        
        [1, 2, 3, 4].forEach(weekNum => {
            const week = WEEKS[weekNum];
            
            // Section header pour chaque semaine
            const weekHeader = document.createElement('div');
            weekHeader.style.cssText = 'padding: 15px 20px; background: #1a1a1a; margin: 20px 0 10px; border-radius: 10px; font-weight: 600; color: #ccc; font-size: 16px;';
            weekHeader.textContent = `Semaine ${weekNum}`;
            container.appendChild(weekHeader);
            
            // Rendre chaque séance (copier la logique existante)
            week.main.forEach(session => {
                const sTracking = tracking[session.id] || {};
                const isDone = !!sTracking.completed;
                const expanded = expandedSessions[session.id] !== undefined ? expandedSessions[session.id] : false;

                const card = document.createElement('div');
                card.className = 'session-card' + (isDone ? ' done-card' : '');

                let doneSummary = '';
                if (isDone && session.type === 'strength') {
                    const doneCount = session.exercises.filter(id => sTracking.exercises?.[id]?.done).length;
                    doneSummary = `<div class="session-done-summary">✓ ${doneCount}/${session.exercises.length} exercices complétés</div>`;
                } else if (isDone && session.type === 'cardio') {
                    const cd = sTracking.cardioData;
                    if (cd) doneSummary = `<div class="session-done-summary">✓ ${cd.duration} min • Niv. ${cd.level} • ${cd.kcal} kcal</div>`;
                    else doneSummary = `<div class="session-done-summary">✓ Séance complétée</div>`;
                }

                const headerHtml = `
                <div class="session-header" onclick="toggleExpand('${session.id}')">
                    <div class="session-header-left">
                        <div class="session-icon ${isDone ? 'type-done' : session.iconClass}">${isDone ? '✅' : session.icon}</div>
                        <div class="session-info">
                            <div class="session-title">${session.label}</div>
                            <div class="session-meta">${session.subtitle}</div>
                            ${doneSummary}
                        </div>
                    </div>
                    <div class="session-header-right">
                        <div class="toggle-arrow ${expanded ? 'open' : ''}">▼</div>
                    </div>
                </div>`;

                let bodyHtml = '';
                if (session.type === 'strength') {
                    const exHtml = session.exercises.map(id => {
                        const ex = EXERCISES[id];
                        const exData = sTracking.exercises?.[id];
                        const exDone = !!exData?.done;
                        const logLine = exDone ? [exData.weight ? exData.weight + ' kg' : null, exData.reps ? exData.reps + ' reps' : null, exData.sets ? exData.sets + ' tours' : null, exData.feeling].filter(Boolean).join(' • ') : '';
                        return `<div class="exercise-item ${exDone ? 'done' : ''}">
                            <div style="flex:1">
                                <div class="exercise-name">${ex.name}</div>
                                <div class="exercise-meta">${ex.target}</div>
                                ${exDone ? `<div class="exercise-logged">✓ ${logLine}</div>` : ''}
                            </div>
                        </div>`;
                    }).join('');
                    bodyHtml = `
                    <div class="session-body ${expanded ? '' : 'collapsed'}">
                        <div class="block-label">Exercices</div>
                        ${exHtml}
                    </div>`;
                } else if (session.type === 'cardio') {
                    const cd = sTracking.cardioData || {};
                    bodyHtml = `
                    <div class="cardio-session-body ${expanded ? '' : 'collapsed'}">
                        <div class="cardio-detail">
                            <div class="cd-line">Durée: ${cd.duration || '—'} min • Niveau: ${cd.level || '—'} • Kcal: ${cd.kcal || '—'} • Distance: ${cd.distance || '—'} km</div>
                        </div>
                    </div>`;
                }

                card.innerHTML = headerHtml + bodyHtml;
                container.appendChild(card);
            });
        });
        updateArchiveStats();
        return;
    }
    
    // Mode normal : affiche la semaine courante
    const week = WEEKS[currentWeek];

    const mainIds = week.main.map(s => s.id);
    const completedMain = mainIds.filter(id => tracking[id]?.completed).length;
    const totalExos = week.main.filter(s => s.type === 'strength').reduce((acc, s) => {
        return acc + s.exercises.filter(id => tracking[s.id]?.exercises?.[id]?.done).length;
    }, 0);
    document.getElementById('statSessions').textContent = `${completedMain}/3`;
    document.getElementById('statExos').textContent = totalExos;
    // Streak = séances principales complétées toutes semaines confondues
    const allMainIds = ['w1sA','w1sB','w1sC','w2sA','w2sB','w2sC','w3sA','w3sB','w3sC','w4sA','w4sB','w4sC','w5sA','w5sB','w5sC','w6sA','w6sB','w6sC','w7sA','w7sB','w7sC'];
    const streak = allMainIds.filter(id => tracking[id]?.completed).length;
    document.getElementById('statStreak').textContent = streak;

    // ── MAIN SESSIONS ──
    week.main.forEach(session => {
        const sTracking = tracking[session.id] || {};
        const isDone = !!sTracking.completed;
        const isExpanded = expandedSessions[session.id] !== false ? (!isDone || expandedSessions[session.id] === true) : false;
        // override: if explicitly toggled
        const expanded = expandedSessions[session.id] !== undefined ? expandedSessions[session.id] : !isDone;

        const card = document.createElement('div');
        card.className = 'session-card' + (isDone ? ' done-card' : '');

        let doneSummary = '';
        if (isDone && session.type === 'strength') {
            const doneCount = session.exercises.filter(id => sTracking.exercises?.[id]?.done).length;
            let extraLine = '';
            if (sTracking.extras) {
                const ex = sTracking.extras;
                const parts = [];
                if (ex.tapis) parts.push(`🏃 ${ex.tapis.distance}km/${ex.tapis.duration}min • FC ${ex.tapis.hr_avg}bpm • ${ex.tapis.kcal}kcal`);
                if (ex.armcurl) parts.push(`💪 Arm Curl ${ex.armcurl.weight}kg×${ex.armcurl.reps}×${ex.armcurl.sets}`);
                if (ex.abcrunch) parts.push(`🔥 Abdo ${ex.abcrunch.weight}kg×${ex.abcrunch.reps}×${ex.abcrunch.sets}`);
                if (ex.upperback) parts.push(`🔙 Upper Back ${ex.upperback.weight}kg×${ex.upperback.reps}×${ex.upperback.sets}`);
                if (ex.elliptique) parts.push(`⚡ Elliptique niv.${ex.elliptique.level} ${ex.elliptique.duration}min`);
                if (parts.length) extraLine = `<div class="session-done-summary" style="font-size:11px;margin-top:2px;opacity:0.85">+ ${parts.join(' • ')}</div>`;
            }
            doneSummary = `<div class="session-done-summary">✓ ${doneCount}/${session.exercises.length} exercices complétés</div>${extraLine}`;
        } else if (isDone && session.type === 'cardio') {
            const cd = sTracking.cardioData;
            if (cd) doneSummary = `<div class="session-done-summary">✓ ${cd.duration} min • Niv. ${cd.level} • ${cd.kcal} kcal</div>`;
            else doneSummary = `<div class="session-done-summary">✓ Séance complétée</div>`;
        }

        const headerHtml = `
        <div class="session-header" onclick="toggleExpand('${session.id}')">
            <div class="session-header-left">
                <div class="session-icon ${isDone ? 'type-done' : session.iconClass}">${isDone ? '✅' : session.icon}</div>
                <div class="session-info">
                    <div class="session-title">${session.label}</div>
                    <div class="session-meta">${session.subtitle}</div>
                    ${doneSummary}
                </div>
            </div>
            <div class="session-header-right">
                <div class="session-check ${isDone ? 'done' : ''}" onclick="event.stopPropagation(); toggleSession('${session.id}')">${isDone ? '✓' : ''}</div>
                <div class="toggle-arrow ${expanded ? 'open' : ''}">▼</div>
            </div>
        </div>`;

        let bodyHtml = '';
        if (session.type === 'strength') {
            const exHtml = session.exercises.map(id => {
                const ex = EXERCISES[id];
                const exData = sTracking.exercises?.[id];
                const exDone = !!exData?.done;
                const logLine = exDone ? [exData.weight ? exData.weight + ' kg' : null, exData.reps ? exData.reps + ' reps' : null, exData.feeling].filter(Boolean).join(' • ') : '';
                return `<div class="exercise-item ${exDone ? 'done' : ''}" onclick="openModal('${session.id}', '${id}')">
                    <div style="flex:1">
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-meta">${ex.target}</div>
                        ${exDone ? `<div class="exercise-logged">✓ ${logLine}</div>` : ''}
                    </div>
                    <div class="ex-check ${exDone ? 'done' : ''}">${exDone ? '✓' : ''}</div>
                </div>`;
            }).join('');
            bodyHtml = `
            <div class="session-body ${expanded ? '' : 'collapsed'}">
                <div class="block-label">Échauffement (5-7 min)</div>
                <div class="warmup-block">${session.warmup.map(w => `<div>• ${w}</div>`).join('')}</div>
                <div class="block-label">Exercices • 3 tours • Repos 90s</div>
                ${exHtml}
                <div class="block-label">Cardio finisher</div>
                <div class="warmup-block"><div>${session.cardio}</div></div>
                <div class="block-label">Retour au calme</div>
                <div class="warmup-block">${session.cooldown.map(c => `<div>• ${c}</div>`).join('')}</div>
            </div>`;
        } else if (session.type === 'cardio') {
            const cd = sTracking.cardioData || {};
            bodyHtml = `
            <div class="cardio-session-body ${expanded ? '' : 'collapsed'}">
                <div class="cardio-detail">
                    <div class="cd-title">🎯 Objectif</div>
                    <div class="cd-line">${session.cardioTarget}</div>
                    ${session.cardioNotes.map(n => `<div class="cd-line">• ${n}</div>`).join('')}
                </div>
                <div class="tip-box" style="margin-bottom:16px;"><p>💡 ${session.tip}</p></div>
                <div class="block-label">Logger ta séance</div>
                <div class="cardio-log">
                    <div class="cardio-field"><label>Durée (min)</label><input type="number" id="cd_duration_${session.id}" value="${cd.duration||''}" placeholder="30"></div>
                    <div class="cardio-field"><label>Niveau</label><input type="number" id="cd_level_${session.id}" value="${cd.level||''}" placeholder="8"></div>
                    <div class="cardio-field"><label>Kcal</label><input type="number" id="cd_kcal_${session.id}" value="${cd.kcal||''}" placeholder="250"></div>
                    <div class="cardio-field"><label>Distance (km)</label><input type="number" step="0.01" id="cd_dist_${session.id}" value="${cd.distance||''}" placeholder="1.5"></div>
                </div>
                <button class="cardio-validate-btn" onclick="validateCardio('${session.id}')">✓ Valider la séance cardio</button>
            </div>`;
        }

        card.innerHTML = headerHtml + bodyHtml;
        container.appendChild(card);
    });

    // ── BIS SESSIONS (reference) ──
    const refDiv = document.createElement('div');
    refDiv.innerHTML = `<div class="ref-label">📋 Séances de référence (si 3e semaine de muscu)</div>`;
    container.appendChild(refDiv);

    week.bis.forEach(session => {
        const sTracking = tracking[session.id] || {};
        const isDone = !!sTracking.completed;
        const expanded = expandedSessions['bis_'+session.id] || false;

        const card = document.createElement('div');
        card.className = 'session-card done-card';
        card.style.opacity = '0.6';

        const exHtml = session.exercises.map(id => {
            const ex = EXERCISES[id];
            return `<div class="exercise-item" onclick="openModal('${session.id}', '${id}')">
                <div style="flex:1">
                    <div class="exercise-name">${ex.name}</div>
                    <div class="exercise-meta">${ex.target}</div>
                </div>
                <div class="ex-check"></div>
            </div>`;
        }).join('');

        card.innerHTML = `
        <div class="session-header" onclick="expandedSessions['bis_${session.id}'] = !expandedSessions['bis_${session.id}']; render()">
            <div class="session-header-left">
                <div class="session-icon ${session.iconClass}">${session.icon}</div>
                <div class="session-info">
                    <div class="session-title" style="font-size:14px;">${session.label}</div>
                    <div class="session-meta">${session.subtitle}</div>
                </div>
            </div>
            <div class="toggle-arrow ${expanded ? 'open' : ''}">▼</div>
        </div>
        <div class="session-body ${expanded ? '' : 'collapsed'}">
            <div class="block-label">Exercices • 3 tours</div>
            ${exHtml}
            <div class="block-label">Cardio finisher</div>
            <div class="warmup-block"><div>${session.cardio}</div></div>
        </div>`;
        container.appendChild(card);
    });
}

function toggleSession(sessionId) {
    const tracking = getTracking();
    if (!tracking[sessionId]) tracking[sessionId] = {};
    tracking[sessionId].completed = !tracking[sessionId].completed;
    tracking[sessionId].completedAt = new Date().toISOString();
    saveTracking(tracking);
    // If marking done, collapse; if undoing, expand
    expandedSessions[sessionId] = !tracking[sessionId].completed;
    render();
}

function validateCardio(sessionId) {
    const tracking = getTracking();
    if (!tracking[sessionId]) tracking[sessionId] = {};
    tracking[sessionId].completed = true;
    tracking[sessionId].completedAt = new Date().toISOString();
    
    const cardioData = {
        duration: document.getElementById('cd_duration_'+sessionId)?.value || '',
        level: document.getElementById('cd_level_'+sessionId)?.value || '',
        kcal: document.getElementById('cd_kcal_'+sessionId)?.value || '',
        distance: document.getElementById('cd_dist_'+sessionId)?.value || ''
    };
    
    tracking[sessionId].cardioData = cardioData;
    saveTracking(tracking);
    
    // Sync to Google Sheets
    syncCardioToSheets(sessionId, cardioData);
    
    expandedSessions[sessionId] = false;
    render();
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(sessionId, exerciseId) {
    const ex = EXERCISES[exerciseId];
    const tracking = getTracking();
    const exData = tracking[sessionId]?.exercises?.[exerciseId] || null;
    let prevData = null;
    Object.entries(tracking).forEach(([sid, sdata]) => {
        if (sid !== sessionId && sdata.exercises?.[exerciseId]?.done) {
            if (!prevData || new Date(sdata.exercises[exerciseId].timestamp) > new Date(prevData.timestamp)) {
                prevData = sdata.exercises[exerciseId];
            }
        }
    });

    currentExercise = { sessionId, exerciseId };
    selectedFeeling = exData?.feeling || null;
    document.getElementById('modalTitle').textContent = ex.name;
    document.getElementById('modalTarget').textContent = ex.target + ' • ' + ex.muscle;

    // Generate recommendation based on previous performance
    let recommendation = '';
    if (prevData) {
        const feeling = prevData.feeling;
        const weight = prevData.weight ? parseFloat(prevData.weight) : null;
        const reps = prevData.reps ? parseInt(prevData.reps) : null;
        const sets = prevData.sets ? parseInt(prevData.sets) : 3;
        
        if (feeling === 'Facile' && weight) {
            recommendation = `→ Augmente à ${(weight + 2.5).toFixed(1)} kg`;
        } else if (feeling === 'Dur' && sets < 4) {
            recommendation = `→ Garde ${weight || 'même charge'}, consolide 3 tours`;
        } else if (feeling === 'Moyen' && sets >= 3) {
            recommendation = ex.hasWeight ? `→ Essaie ${weight ? (weight + 2.5).toFixed(1) : ''} kg ou +1 tour` : `→ +5 sec ou +1 tour`;
        } else if (feeling === 'Moyen') {
            recommendation = `→ Garde même charge, vise 3-4 tours`;
        }
    }
    
    const prevHtml = prevData ? `
        <div class="prev-data">
            <div class="prev-label">Dernière fois</div>
            <div class="prev-values">
                ${prevData.weight ? `<span class="prev-chip">${prevData.weight} kg</span>` : ''}
                ${prevData.reps ? `<span class="prev-chip">${prevData.reps} reps</span>` : ''}
                ${prevData.sets ? `<span class="prev-chip">${prevData.sets} tours</span>` : ''}
                ${prevData.feeling ? `<span class="prev-chip">${prevData.feeling}</span>` : ''}
            </div>
            ${recommendation ? `<div class="prev-values recommendation"><span class="prev-chip suggest">${recommendation}</span></div>` : ''}
        </div>` : '';

    const timerDuration = ex.hasTimer ? ex.timerDuration : 90;
    const timerLabel = ex.hasTimer ? "Timer gainage" : "Timer repos";

    document.getElementById('modalBody').innerHTML = `
        ${mediaHtml(exerciseId)}
        <a href="${ex.video}" target="_blank" class="yt-btn">📺 Vidéo démonstration YouTube</a>
        <div class="section-title">Instructions</div>
        <ol class="instruction-list">${ex.instructions.map(i => `<li>${i}</li>`).join('')}</ol>
        <div class="tip-box"><p>💡 ${ex.tip}</p></div>
        <div class="timer-box">
            <div class="timer-label">${timerLabel}</div>
            <div class="timer-display" id="timerDisplay">${timerDuration}s</div>
            <div class="timer-btns">
                <button class="timer-btn" onclick="skipTimer(${timerDuration})">Skip ⏭</button>
                <button class="timer-btn go" onclick="startTimer(${timerDuration})">▶ Démarrer</button>
            </div>
        </div>
        <div class="section-title">Tracking</div>
        <div class="tracking-box">
            ${prevHtml}
            ${ex.hasWeight ? `<div class="field"><label>Poids (kg)</label><input type="number" id="weightInput" value="${exData?.weight || ''}" placeholder="Ex: 30"></div>` : ''}
            <div class="field"><label>${ex.hasTimer ? 'Durée tenue (sec)' : 'Reps effectuées'}</label><input type="number" id="repsInput" value="${exData?.reps || ''}" placeholder="${ex.hasTimer ? 'Ex: 45' : 'Ex: 12'}"></div>
            <div class="field"><label>Nombre de tours</label><input type="number" id="setsInput" value="${exData?.sets || '3'}" placeholder="Ex: 3"></div>
            <div class="field">
                <label>Ressenti</label>
                <div class="feeling-row">
                    <div class="feeling-btn ${selectedFeeling === 'Facile' ? 'sel' : ''}" onclick="selectFeeling('Facile')">😊 Facile</div>
                    <div class="feeling-btn ${selectedFeeling === 'Moyen' ? 'sel' : ''}" onclick="selectFeeling('Moyen')">😐 Moyen</div>
                    <div class="feeling-btn ${selectedFeeling === 'Dur' ? 'sel' : ''}" onclick="selectFeeling('Dur')">😤 Dur</div>
                </div>
            </div>
            <button class="validate-btn" onclick="validateExercise()">✓ Valider l'exercice</button>
        </div>
    `;
    document.getElementById('modal').classList.add('active');
    document.getElementById('modal').scrollTop = 0;
}

function closeModal() { stopTimer(); document.getElementById('modal').classList.remove('active'); render(); }

function startTimer(s) {
    stopTimer(); timerSeconds = s; updateTimerDisplay();
    timerInterval = setInterval(() => { timerSeconds--; updateTimerDisplay(); if (timerSeconds <= 0) { stopTimer(); playBeep(); } }, 1000);
}
function skipTimer(d) { stopTimer(); timerSeconds = d; const el = document.getElementById('timerDisplay'); if (el) { el.textContent = d+'s'; el.className = 'timer-display'; } }
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerDisplay() {
    const el = document.getElementById('timerDisplay');
    if (!el) return;
    if (timerSeconds <= 0) { el.textContent = '✓ Go !'; el.className = 'timer-display done-t'; }
    else if (timerSeconds <= 5) { el.textContent = timerSeconds+'s'; el.className = 'timer-display warning'; }
    else { el.textContent = timerSeconds+'s'; el.className = 'timer-display'; }
}
function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.15, 0.3].forEach(d => {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 880;
            g.gain.setValueAtTime(0.3, ctx.currentTime + d);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d + 0.12);
            o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.15);
        });
    } catch(e) {}
}
function selectFeeling(f) {
    selectedFeeling = f;
    document.querySelectorAll('.feeling-btn').forEach(btn => btn.classList.toggle('sel', btn.textContent.includes(f)));
}
function validateExercise() {
    const { sessionId, exerciseId } = currentExercise;
    const ex = EXERCISES[exerciseId];
    const tracking = getTracking();
    if (!tracking[sessionId]) tracking[sessionId] = {};
    if (!tracking[sessionId].exercises) tracking[sessionId].exercises = {};
    
    const exerciseData = {
        done: true,
        weight: ex.hasWeight ? (document.getElementById('weightInput')?.value || null) : null,
        reps: document.getElementById('repsInput')?.value || null,
        sets: document.getElementById('setsInput')?.value || '3',
        feeling: selectedFeeling,
        timestamp: new Date().toISOString()
    };
    
    tracking[sessionId].exercises[exerciseId] = exerciseData;
    saveTracking(tracking);
    
    // Sync to Google Sheets
    syncToSheets(sessionId, exerciseId, exerciseData);
    
    closeModal();
}
</script>
</body>
</html>
